<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Insighta Labs — Dashboard</title>
  <link rel="stylesheet" href="/css/main.css" />
</head>
<body>

  <!-- ── Navbar ────────────────────────────────────────────────────────── -->
  <nav class="navbar">
    <div class="navbar-brand">
      <svg width="24" height="24" viewBox="0 0 40 40" fill="none">
        <rect width="40" height="40" rx="8" fill="#238636"/>
        <path d="M20 8C13.37 8 8 13.37 8 20c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 32 20c0-6.63-5.37-12-12-12z" fill="white"/>
      </svg>
      <span>Insighta Labs</span>
    </div>
    <div class="navbar-right">
      <span class="role-badge" id="roleBadge"></span>
      <span class="username" id="navUsername"></span>
      <button class="btn btn-sm btn-outline" id="logoutBtn">Logout</button>
    </div>
  </nav>

  <!-- ── Main Layout ───────────────────────────────────────────────────── -->
  <div class="layout">

    <!-- Sidebar filters -->
    <aside class="sidebar">
      <h3>Filters</h3>

      <div class="form-group">
        <label>Gender</label>
        <select id="filterGender">
          <option value="">All</option>
          <option value="male">Male</option>
          <option value="female">Female</option>
        </select>
      </div>

      <div class="form-group">
        <label>Age Group</label>
        <select id="filterAgeGroup">
          <option value="">All</option>
          <option value="child">Child</option>
          <option value="teenager">Teenager</option>
          <option value="adult">Adult</option>
          <option value="senior">Senior</option>
        </select>
      </div>

      <div class="form-group">
        <label>Country Code</label>
        <input type="text" id="filterCountry" placeholder="e.g. NG, ZA, KE" maxlength="2" />
      </div>

      <div class="form-group">
        <label>Min Age</label>
        <input type="number" id="filterMinAge" placeholder="0" min="0" max="120" />
      </div>

      <div class="form-group">
        <label>Max Age</label>
        <input type="number" id="filterMaxAge" placeholder="120" min="0" max="120" />
      </div>

      <div class="form-group">
        <label>Sort By</label>
        <select id="filterSortBy">
          <option value="">Default</option>
          <option value="age">Age</option>
          <option value="gender_probability">Gender Probability</option>
          <option value="created_at">Created At</option>
        </select>
      </div>

      <div class="form-group">
        <label>Order</label>
        <select id="filterOrder">
          <option value="asc">Ascending</option>
          <option value="desc">Descending</option>
        </select>
      </div>

      <button class="btn btn-primary btn-full" id="applyFiltersBtn">Apply Filters</button>
      <button class="btn btn-outline btn-full" id="clearFiltersBtn" style="margin-top:8px">Clear</button>

      <hr class="divider" />

      <button class="btn btn-export btn-full" id="exportBtn">
        ⬇ Export CSV
      </button>
      <p class="export-note" id="exportNote"></p>
    </aside>

    <!-- Main content -->
    <main class="main">

      <!-- Search bar -->
      <div class="search-bar">
        <input
          type="text"
          id="nlSearch"
          placeholder='Natural language search — e.g. "show me adult females from Kenya"'
        />
        <button class="btn btn-primary" id="nlSearchBtn">Search</button>
        <button class="btn btn-outline" id="clearSearchBtn">Clear</button>
      </div>

      <!-- Stats row -->
      <div class="stats-row" id="statsRow">
        <div class="stat-card">
          <span class="stat-value" id="statTotal">—</span>
          <span class="stat-label">Total Records</span>
        </div>
        <div class="stat-card">
          <span class="stat-value" id="statPage">—</span>
          <span class="stat-label">Current Page</span>
        </div>
        <div class="stat-card">
          <span class="stat-value" id="statPages">—</span>
          <span class="stat-label">Total Pages</span>
        </div>
      </div>

      <!-- Loading state -->
      <div class="loading" id="loadingState">
        <div class="spinner"></div>
        <p>Loading profiles...</p>
      </div>

      <!-- Error state -->
      <div class="error-state" id="errorState" style="display:none">
        <p id="errorMsg"></p>
        <button class="btn btn-outline" id="retryBtn">Retry</button>
      </div>

      <!-- Profiles table -->
      <div class="table-wrap" id="tableWrap" style="display:none">
        <table class="profiles-table">
          <thead>
            <tr>
              <th>Name</th>
              <th>Gender</th>
              <th>Age</th>
              <th>Age Group</th>
              <th>Country</th>
              <th>G. Prob</th>
              <th>C. Prob</th>
            </tr>
          </thead>
          <tbody id="profilesBody"></tbody>
        </table>
      </div>

      <!-- Pagination -->
      <div class="pagination" id="pagination" style="display:none">
        <button class="btn btn-sm btn-outline" id="prevBtn">← Prev</button>
        <span id="pageInfo"></span>
        <button class="btn btn-sm btn-outline" id="nextBtn">Next →</button>
      </div>

    </main>
  </div>
  
  <script src="/js/config.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/profiles.js"></script>
</body>
</html>

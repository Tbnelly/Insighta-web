name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Check server syntax
        run: node --check server.js

      - name: Verify required files exist
        run: |
          test -f public/index.html
          test -f public/login.html
          test -f public/auth/success.html
          test -f public/js/config.js
          test -f public/js/auth.js
          test -f public/js/api.js
          test -f public/js/profiles.js
          test -f public/css/main.css
          echo "All required files present"